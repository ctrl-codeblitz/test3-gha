name: Grade Submissions

on:
  push:
    paths: 
      - 'stage1/solutions/**'

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Detect stage
        id: set_stage
        run: |
          if [[ "${{ github.event.head_commit.modified }}" == *"stage1/"* ]]; then
            echo "current_stage=1" >> $GITHUB_OUTPUT
            echo "next_stage=2" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.head_commit.modified }}" == *"stage2/"* ]]; then
            echo "current_stage=2" >> $GITHUB_OUTPUT
            echo "next_stage=3" >> $GITHUB_OUTPUT
          fi
      
      - name: Make script executable
        run: chmod +x grade.sh
      
      - name: Run grading script
        run: ./grade.sh stage${{ steps.set_stage.outputs.current_stage }}

      - name: Proceed to next stage
        if: success()
        run: |
          curl -X POST https://unfurbished-nonmanifest-alishia.ngrok-free.dev/next-stage \
          --connect-timeout 20 \
          --max-time 60 \
          -H "Content-Type: application/json" \
          -d '{
            "team_name": "${{ github.event.repository.name }}",
            "stage": ${{ steps.set_stage.outputs.next_stage }}
          }'
